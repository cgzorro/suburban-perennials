<div class="panel">
  <input
    id="search"
    class="search-box"
    type="text"
    placeholder="Search plant, SKU, common name, genus..."
  />

  <div class="filter-section">
    <div class="filter-label">Quick Traits</div>
    <div class="chip-row">
      <button type="button" class="chip-btn" id="chipSun">Sun</button>
      <button type="button" class="chip-btn" id="chipShade">Shade</button>
      <button type="button" class="chip-btn" id="chipRoses">Roses</button>
      <button type="button" class="chip-btn" id="chipDrought">Drought</button>
      <button type="button" class="chip-btn" id="chipPollinator">Pollinator</button>
      <button type="button" class="chip-btn" id="chipDeer">Deer Resistant</button>
      <button type="button" class="chip-btn" id="chipNative">Native</button>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-label">Browse Filters</div>
    <div class="filters-grid">
      <div class="select-wrap">
        <select id="plantGroup">
          <option value="">All Plant Groups</option>
        </select>
      </div>

      <div class="select-wrap">
        <select id="color">
          <option value="">All Colors</option>
        </select>
      </div>

      <div class="select-wrap">
        <select id="heightBucket">
          <option value="">All Heights</option>
          <option value="under12">Under 12"</option>
          <option value="12to24">12–24"</option>
          <option value="24to36">24–36"</option>
          <option value="36plus">36"+</option>
        </select>
      </div>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-label">View Options</div>
    <div class="meta-bar">
      <button type="button" class="pill" id="onlyImages">Only With Images</button>
      <button type="button" class="pill" id="onlyPriced">Only Priced Items</button>
      <button type="button" class="pill" id="show24">24</button>
      <button type="button" class="pill active" id="show48">48</button>
      <button type="button" class="pill" id="show96">96</button>
      <button type="button" class="pill" id="showAll">All</button>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-label">Tools</div>
    <div class="button-row">
      <button type="button" class="action-btn" id="clearFilters">Clear Filters</button>
      <button type="button" class="action-btn" id="showFavorites">Favorites</button>
      <button type="button" class="action-btn" id="showCompare">Compare</button>
      <button type="button" class="action-btn" id="toggleScanner">Scan SKU</button>
    </div>
  </div>

  <div id="scannerWrap">
    <video id="scannerVideo" autoplay playsinline></video>
    <div class="scanner-note">
      Camera-based scan works best on phones that support barcode detection in the browser. If not, type the SKU in the search box.
    </div>
  </div>

  <div class="subtle">
    Tip: search by SKU like <strong>26170</strong>, common name like <strong>hosta</strong>, or genus like <strong>echinacea</strong>.
  </div>
</div>
