<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suburban Perennials Finder</title>
  <style>
    :root {
      --bg: #f5f5f4;
      --card: #ffffff;
      --text: #1c1917;
      --muted: #57534e;
      --border: #d6d3d1;
      --sun: #fef3c7;
      --shade: #dcfce7;
      --part: #dbeafe;
      --accent: #111827;
      --chip: #e7e5e4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .sub {
      color: var(--muted);
      margin: 0;
      line-height: 1.4;
    }
    .counts, .row, .chips, .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .count, .chip {
      background: var(--chip);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1fr;
      gap: 10px;
    }
    .toolbar-2 {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
      align-items: center;
    }
    input[type="text"], select, .btn, label.file {
      min-height: 46px;
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      cursor: pointer;
      min-width: 110px;
    }
    .btn-dark {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .btn-light {
      background: #fff;
      color: var(--text);
    }
    .view-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }
    .img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      background: #e7e5e4;
    }
    .body { padding: 14px; }
    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .title {
      font-weight: 700;
      font-size: 18px;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .sku, .url, .category {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }
    .url {
      word-break: break-all;
      display: block;
      margin-top: 4px;
    }
    .badge {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      white-space: nowrap;
    }
    .sun { background: var(--sun); }
    .shade { background: var(--shade); }
    .part { background: var(--part); }
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
      margin: 12px 0;
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
    }
    th, td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 10px;
      vertical-align: top;
    }
    th { background: #fafaf9; }
    .hidden { display: none; }
    #fileInput { display: none; }
    @media (max-width: 720px) {
      .toolbar { grid-template-columns: 1fr; }
      .meta-grid { grid-template-columns: 1fr; }
      h1 { font-size: 24px; }
      .wrap { padding: 12px; }
      .panel { padding: 14px; border-radius: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="row" style="justify-content:space-between;align-items:flex-end;">
        <div>
          <div style="font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:#78716c;margin-bottom:6px;">Phone test</div>
          <h1>Suburban Perennials Finder</h1>
          <p class="sub">Search, filter, and test import with a stable single-file version.</p>
        </div>
        <div class="counts" id="counts"></div>
      </div>
    </div>

    <div class="panel">
      <div class="toolbar">
        <input id="search" type="text" placeholder="Search SKU, product, variety, size..." />
        <select id="light">
          <option value="All">All</option>
          <option value="Sun">Sun</option>
          <option value="Shade">Shade</option>
          <option value="Part Shade">Part Shade</option>
        </select>
        <select id="sortBy">
          <option value="commonName">Sort: Common name</option>
          <option value="scientificName">Sort: Scientific name</option>
          <option value="variety">Sort: Variety</option>
          <option value="size">Sort: Size</option>
          <option value="sku">Sort: SKU</option>
        </select>
        <div class="view-toggle">
          <button id="cardsBtn" type="button" class="btn active">Card view</button>
          <button id="tableBtn" type="button" class="btn btn-light">Table view</button>
        </div>
      </div>
      <div class="toolbar-2">
        <label><input id="droughtOnly" type="checkbox" /> Drought tolerant only</label>
        <label class="file btn btn-light" for="fileInput">Import JSON / CSV</label>
        <input id="fileInput" type="file" accept=".json,.csv" />
        <button id="exportJson" type="button" class="btn btn-dark">Export JSON</button>
        <button id="exportCsv" type="button" class="btn btn-light">Export CSV</button>
      </div>
    </div>

    <div id="cards" class="cards"></div>

    <div id="tableWrap" class="panel hidden" style="padding:0; overflow:auto;">
      <table>
        <thead>
          <tr>
            <th>SKU</th>
            <th>Product</th>
            <th>Common</th>
            <th>Scientific</th>
            <th>Variety</th>
            <th>Size</th>
            <th>Light</th>
            <th>Price</th>
            <th>Avail</th>
            <th>Link</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
