<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suburban Plant Finder</title>
  <style>
    :root {
      --bg: #09100c;
      --bg-elev: #0f1813;
      --bg-soft: #152018;
      --text: #edf5ee;
      --text-muted: #aeb9b0;
      --border: #243429;
      --accent: #8fc987;
      --chip-bg: #17311e;
      --chip-text: #d8f1da;
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      --input-bg: #08100b;
      --card-bg: #0f1813;
      --success: #6fbf73;
    }

    html[data-theme="light"] {
      --bg: #f5f7f4;
      --bg-elev: #ffffff;
      --bg-soft: #eef2ec;
      --text: #1c241d;
      --text-muted: #5d6a60;
      --border: #d8e0d7;
      --accent: #2f6b3c;
      --chip-bg: #e8f2ea;
      --chip-text: #24512e;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --input-bg: #ffffff;
      --card-bg: #ffffff;
      --success: #5daa61;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(77, 121, 82, 0.14), transparent 26%),
        radial-gradient(circle at top right, rgba(77, 121, 82, 0.10), transparent 24%),
        var(--bg);
    }

    .container {
      width: min(1440px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--text-muted);
    }

    .theme-toggle {
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      box-shadow: var(--shadow);
      font-weight: 600;
    }

    .layout {
      display: grid;
      grid-template-columns: 330px 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel, .results-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 18px;
      position: sticky;
      top: 18px;
      max-height: calc(100vh - 36px);
      overflow: auto;
    }

    .results-panel {
      padding: 18px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 1rem;
      font-weight: 800;
    }

    .muted { color: var(--text-muted); }

    .search, .select {
      width: 100%;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
      outline: none;
    }

    .search-row, .control-row {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    .sidebar-toolbar {
      margin: 0 0 18px;
      display: flex;
      gap: 10px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0 18px;
    }

    .chip {
      border: 1px solid var(--border);
      background: var(--chip-bg);
      color: var(--chip-text);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: .96rem;
      cursor: pointer;
      user-select: none;
    }

    .chip.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
      border-radius: 14px;
      padding: 11px 14px;
      cursor: pointer;
      font-weight: 700;
      transition: background-color .18s ease, border-color .18s ease, transform .12s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .clear-btn,
    .mobile-clear-btn {
      justify-content: center;
      text-align: center;
    }

    .clear-btn.is-confirmed,
    .mobile-clear-btn.is-confirmed {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .results-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      border: 1px solid var(--border);
      background: var(--bg-elev);
      border-radius: 18px;
      overflow: hidden;
    }

    .card-image {
      aspect-ratio: 4 / 3;
      background: var(--bg-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .no-image {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      background: var(--bg-soft);
      font-size: 0.95rem;
      text-align: center;
      padding: 12px;
    }

    .card-body { padding: 14px; }

    .card-title {
      margin: 0 0 6px;
      font-size: 1.05rem;
      line-height: 1.25;
    }

    .card-meta {
      color: var(--text-muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0;
    }

    .tag {
      font-size: .78rem;
      border-radius: 999px;
      padding: 5px 8px;
      background: var(--chip-bg);
      color: var(--chip-text);
      border: 1px solid var(--border);
    }

    .price {
      font-weight: 800;
      color: var(--accent);
      margin-top: 10px;
    }

    .small { font-size: .88rem; }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--text-muted);
      border: 1px dashed var(--border);
      border-radius: 16px;
      background: var(--bg-soft);
    }

    .mobile-clear-btn {
      display: none;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }

      .panel {
        position: static;
        max-height: none;
        overflow: visible;
      }

      .mobile-clear-btn {
        display: block;
        position: fixed;
        left: 16px;
        right: 16px;
        bottom: calc(16px + env(safe-area-inset-bottom, 0px));
        z-index: 999;
        border: 1px solid var(--border);
        background: var(--accent);
        color: white;
        border-radius: 14px;
        padding: 14px 16px;
        font-size: 1rem;
        font-weight: 800;
        box-shadow: var(--shadow);
        cursor: pointer;
      }

      body {
        padding-bottom: 88px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <h1>Suburban Plant Finder</h1>
        <p>Search and browse perennial inventory.</p>
      </div>
      <button id="themeToggle" class="theme-toggle" type="button">Light Mode</button>
    </div>

    <div class="layout">
      <aside class="panel">
        <h2 class="section-title">Search</h2>
        <div class="search-row">
          <input id="searchInput" class="search" type="text" placeholder="Search by SKU, common name, genus, or keyword…" />
        </div>

        <div class="sidebar-toolbar">
          <button id="clearFilters" class="btn primary clear-btn" type="button">Clear Filters</button>
        </div>

        <h2 class="section-title">Quick Traits</h2>
        <div id="traitChips" class="chips"></div>

        <h2 class="section-title">Browse Filters</h2>
        <div class="control-row">
          <select id="groupFilter" class="select">
            <option value="">All Plant Groups</option>
          </select>
          <select id="colorFilter" class="select">
            <option value="">All Colors</option>
          </select>
          <select id="heightFilter" class="select">
            <option value="">All Heights</option>
            <option value="under12">Under 12"</option>
            <option value="12to24">12–24"</option>
            <option value="24to36">24–36"</option>
            <option value="36plus">36"+</option>
          </select>
        </div>
      </aside>

      <main>
        <section class="results-panel">
          <div class="results-head">
            <div>
              <strong id="resultCount">Loading plants…</strong>
              <div class="muted small">Showing current filtered results</div>
            </div>
          </div>

          <div id="results" class="results-grid"></div>
        </section>
      </main>
    </div>
  </div>

  <button id="mobileClearFilters" class="mobile-clear-btn" type="button">Clear Filters</button>

  <script>
    const state = {
      plants: [],
      filtered: [],
      activeTraits: new Set(),
      theme: localStorage.getItem("suburban-theme") || "dark",
      clearFlashTimer: null
    };

    const TRAITS = ["sun", "shade", "drought", "pollinator", "deer resistant", "native"];

    const els = {
      html: document.documentElement,
      themeToggle: document.getElementById("themeToggle"),
      searchInput: document.getElementById("searchInput"),
      groupFilter: document.getElementById("groupFilter"),
      colorFilter: document.getElementById("colorFilter"),
      heightFilter: document.getElementById("heightFilter"),
      clearFilters: document.getElementById("clearFilters"),
      mobileClearFilters: document.getElementById("mobileClearFilters"),
      results: document.getElementById("results"),
      resultCount: document.getElementById("resultCount"),
      traitChips: document.getElementById("traitChips")
    };

    function setTheme(theme) {
      state.theme = theme;
      els.html.setAttribute("data-theme", theme);
      localStorage.setItem("suburban-theme", theme);
      els.themeToggle.textContent = theme === "dark" ? "Light Mode" : "Dark Mode";
    }

    function toggleTheme() {
      setTheme(state.theme === "dark" ? "light" : "dark");
    }

    function normalizeText(v) {
      return (v || "").toString().trim().toLowerCase();
    }

    function parseHeightToInches(heightText) {
      if (!heightText) return null;
      const t = String(heightText).toLowerCase();

      let m = t.match(/(\d+)\s*-\s*(\d+)\s*(?:in|")/);
      if (m) return (Number(m[1]) + Number(m[2])) / 2;

      m = t.match(/(\d+)\s*(?:in|")/);
      if (m) return Number(m[1]);

      m = t.match(/(\d+)\s*-\s*(\d+)\s*ft/);
      if (m) return ((Number(m[1]) + Number(m[2])) / 2) * 12;

      m = t.match(/(\d+)\s*ft/);
      if (m) return Number(m[1]) * 12;

      return null;
    }

    function heightBucket(heightText) {
      const inches = parseHeightToInches(heightText);
      if (inches == null) return "";
      if (inches < 12) return "under12";
      if (inches < 24) return "12to24";
      if (inches < 36) return "24to36";
      return "36plus";
    }

    function getPlantGroup(plant) {
      const raw = (
        plant.plant_group ||
        plant.category ||
        plant.section ||
        ""
      ).toLowerCase();

      const nameBlob = [
        plant.name,
        plant.common,
        plant.genus,
        plant.link
      ].join(" ").toLowerCase();

      if (raw.includes("sun") || nameBlob.includes("|psu") || nameBlob.includes("perennials-for-sun")) {
        return "Perennials - Sun";
      }
      if (raw.includes("shade") || nameBlob.includes("|psh") || nameBlob.includes("perennials-for-shade")) {
        return "Perennials - Shade";
      }
      if (raw.includes("rose") || nameBlob.includes("rose") || nameBlob.includes("knock out") || nameBlob.includes("drift")) {
        return "Roses";
      }
      if (raw.includes("hardy vining") || raw.includes("vine") || nameBlob.includes("|vin")) {
        if (nameBlob.includes("clematis")) return "Clematis";
        return "Hardy Vining Plants";
      }
      if (raw.includes("clematis") || nameBlob.includes("clematis")) {
        return "Clematis";
      }
      if (raw.includes("peon") || nameBlob.includes("peon")) {
        return "Peonies";
      }
      if (raw.includes("grape") || raw.includes("berries") || nameBlob.includes("grape") || nameBlob.includes("berry")) {
        return "Grapes & Berries";
      }
      if (raw.includes("ground") || nameBlob.includes("ground cover") || nameBlob.includes("groundcover") || nameBlob.includes("vinca") || nameBlob.includes("pachysandra")) {
        return "Ground Covers";
      }
      if (raw.includes("native") || nameBlob.includes("|pna")) {
        return "Native Perennials";
      }
      return "Perennials";
    }

    function inferTraits(plant) {
      const haystack = [
        plant.name,
        plant.common,
        plant.genus,
        plant.category,
        plant.plant_group,
        plant.section,
        plant.light
      ].join(" ").toLowerCase();

      return {
        sun: haystack.includes("sun"),
        shade: haystack.includes("shade"),
        drought: !!plant.drought || haystack.includes("drought"),
        pollinator: !!plant.pollinator || haystack.includes("pollinator"),
        "deer resistant": !!plant.deer || haystack.includes("deer"),
        native: !!plant.native || haystack.includes("native")
      };
    }

    function inferColor(plant) {
      return plant.color || "";
    }

    function imageFor(plant) {
      const img = plant.image || "";
      const badHints = [
        "mail-link",
        "subscribe",
        "newsletter",
        "logo",
        "icon",
        "facebook",
        "instagram",
        "youtube",
        "pinterest",
        "banner",
        "promo",
        "placeholder",
        "no-image",
        "default"
      ];

      const lower = String(img).toLowerCase();
      if (!img) return "";
      if (badHints.some(h => lower.includes(h))) return "";
      return img;
    }

    function populateFilters(plants) {
      const groups = [...new Set(plants.map(getPlantGroup).filter(Boolean))].sort();
      const colors = [...new Set(plants.map(inferColor).filter(Boolean))].sort();

      els.groupFilter.innerHTML = `<option value="">All Plant Groups</option>`;
      els.colorFilter.innerHTML = `<option value="">All Colors</option>`;

      for (const group of groups) {
        const opt = document.createElement("option");
        opt.value = group;
        opt.textContent = group;
        els.groupFilter.appendChild(opt);
      }

      for (const color of colors) {
        const opt = document.createElement("option");
        opt.value = color;
        opt.textContent = color;
        els.colorFilter.appendChild(opt);
      }
    }

    function renderTraitChips() {
      els.traitChips.innerHTML = "";
      for (const trait of TRAITS) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip" + (state.activeTraits.has(trait) ? " active" : "");
        btn.textContent = trait.replace(/\b\w/g, m => m.toUpperCase());
        btn.addEventListener("click", () => {
          if (state.activeTraits.has(trait)) state.activeTraits.delete(trait);
          else state.activeTraits.add(trait);
          renderTraitChips();
          applyFilters();
        });
        els.traitChips.appendChild(btn);
      }
    }

    function matchesSearch(plant, q) {
      if (!q) return true;
      const haystack = [
        plant.name,
        plant.sku,
        plant.common,
        plant.genus,
        plant.species,
        plant.series,
        plant.category,
        plant.plant_group,
        plant.section,
        plant.light,
        plant.height,
        plant.width,
        plant.color
      ].join(" ").toLowerCase();

      return haystack.includes(q);
    }

    function applyFilters() {
      const q = normalizeText(els.searchInput.value);
      const group = els.groupFilter.value;
      const color = els.colorFilter.value;
      const height = els.heightFilter.value;

      state.filtered = state.plants.filter(plant => {
        if (!matchesSearch(plant, q)) return false;
        if (group && getPlantGroup(plant) !== group) return false;
        if (color && inferColor(plant) !== color) return false;
        if (height && heightBucket(plant.height) !== height) return false;

        const traits = inferTraits(plant);
        for (const trait of state.activeTraits) {
          if (!traits[trait]) return false;
        }

        return true;
      });

      renderResults();
    }

    function flashClearConfirmation() {
      const buttons = [els.clearFilters, els.mobileClearFilters].filter(Boolean);

      for (const btn of buttons) {
        btn.classList.add("is-confirmed");
        btn.textContent = "Filters Cleared";
      }

      window.clearTimeout(state.clearFlashTimer);
      state.clearFlashTimer = window.setTimeout(() => {
        for (const btn of buttons) {
          btn.classList.remove("is-confirmed");
          btn.textContent = "Clear Filters";
        }
      }, 1200);
    }

    function clearFilters() {
      els.searchInput.value = "";
      els.groupFilter.value = "";
      els.colorFilter.value = "";
      els.heightFilter.value = "";
      state.activeTraits.clear();
      renderTraitChips();
      applyFilters();
      flashClearConfirmation();
    }

    function renderResults() {
      els.resultCount.textContent = `${state.filtered.length} plants`;
      els.results.innerHTML = "";

      if (!state.filtered.length) {
        els.results.innerHTML = `<div class="empty">No plants match the current filters.</div>`;
        return;
      }

      for (const plant of state.filtered) {
        const traits = inferTraits(plant);
        const tags = Object.entries(traits).filter(([, v]) => v).map(([k]) => k);
        const img = imageFor(plant);

        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="card-image">
            ${img
              ? `<img src="${img}" alt="${plant.name || "Plant"}">`
              : `<div class="no-image">No image available</div>`
            }
          </div>
          <div class="card-body">
            <h3 class="card-title">${plant.name || "Unnamed Plant"}</h3>
            <div class="card-meta">SKU: ${plant.sku || "—"} · ${getPlantGroup(plant)}</div>
            <div class="small muted">
              ${(plant.common || "") ? `Common: ${plant.common}` : ""}
              ${(plant.genus || "") ? `${plant.common ? " · " : ""}Genus: ${plant.genus}` : ""}
            </div>
            <div class="small muted">
              ${plant.light || ""}${plant.height ? ` · Height: ${plant.height}` : ""}${plant.width ? ` · Width: ${plant.width}` : ""}
            </div>
            <div class="card-tags">
              ${tags.slice(0, 5).map(t => `<span class="tag">${t}</span>`).join("")}
            </div>
            <div class="price">${plant.price || ""}</div>
            <div style="margin-top:12px;">
              ${plant.link ? `<a class="btn" href="${plant.link}" target="_blank" rel="noopener noreferrer">Open Product</a>` : ""}
            </div>
          </div>
        `;
        els.results.appendChild(card);
      }
    }

    async function loadPlants() {
      try {
        const res = await fetch("./plants.json", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        state.plants = Array.isArray(data) ? data : [];
        populateFilters(state.plants);
        renderTraitChips();
        applyFilters();
      } catch (err) {
        els.resultCount.textContent = "Failed to load plants";
        els.results.innerHTML = `<div class="empty">Could not load <code>plants.json</code>. ${err.message}</div>`;
      }
    }

    function wireEvents() {
      els.themeToggle.addEventListener("click", toggleTheme);
      els.searchInput.addEventListener("input", applyFilters);
      els.groupFilter.addEventListener("change", applyFilters);
      els.colorFilter.addEventListener("change", applyFilters);
      els.heightFilter.addEventListener("change", applyFilters);
      els.clearFilters.addEventListener("click", clearFilters);
      els.mobileClearFilters.addEventListener("click", clearFilters);
    }

    setTheme(state.theme);
    wireEvents();
    renderTraitChips();
    loadPlants();
  </script>
</body>
</html>
