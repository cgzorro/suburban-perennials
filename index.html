<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Suburban Perennials Finder</title>

<style>
body{
font-family:Arial;
margin:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

button{
padding:10px;
border-radius:6px;
border:none;
background:#333;
color:white;
margin-top:10px;
}

input,select{
padding:10px;
margin-bottom:10px;
width:100%;
}
</style>
</head>

<body>

<h2>Suburban Perennials Finder</h2>

<input id="search" placeholder="Search plant or SKU">

<select id="light">
<option value="All">All</option>
<option value="Sun">Sun</option>
<option value="Shade">Shade</option>
</select>

<label>
<input type="checkbox" id="drought">
Drought tolerant only
</label>

<div id="plants"></div>

<script>

let plants = [

{
sku:"26070",
name:"Firefly Diamond Yarrow 1G",
common:"Yarrow",
light:"Sun",
drought:true,
link:"https://store.suburbanlg.com/products/firefly-diamond-yarrow-1g-26070.html"
},

{
sku:"26071",
name:"Moonshine Yarrow 1G",
common:"Yarrow",
light:"Sun",
drought:true,
link:"https://store.suburbanlg.com/departments/achillea-yarrow-%7C16%7CPSU%7CACHLEA.html"
},

{
sku:"34001",
name:"Cheyenne Spirit Coneflower 1G",
common:"Coneflower",
light:"Sun",
drought:true,
link:"https://store.suburbanlg.com/departments/perennials-for-sun-%7C16%7CPSU.html"
},

{
sku:"41022",
name:"Blue Angel Hosta 1G",
common:"Hosta",
light:"Shade",
drought:false,
link:"https://store.suburbanlg.com/departments/hostas-%7C16%7CPSH%7CHOSTAS.html"
},

{
sku:"52009",
name:"Ivory Prince Lenten Rose",
common:"Helleborus",
light:"Shade",
drought:true,
link:"https://store.suburbanlg.com/departments/perennials-for-shade-%7C16%7CPSH.html"
}

];

function render(){

let search=document.getElementById("search").value.toLowerCase();
let light=document.getElementById("light").value;
let drought=document.getElementById("drought").checked;

let results=plants.filter(p=>{

if(search && !p.name.toLowerCase().includes(search) && !p.sku.includes(search))
return false;

if(light!=="All" && p.light!==light)
return false;

if(drought && !p.drought)
return false;

return true;

});

let html="";

results.forEach(p=>{

html+=`
<div class="card">
<b>${p.name}</b><br>
SKU: ${p.sku}<br>
Light: ${p.light}<br>
Drought: ${p.drought ? "Yes":"No"}<br>

<a href="${p.link}" target="_blank">
<button>Open product page</button>
</a>
</div>
`;

});

document.getElementById("plants").innerHTML=html;

}

render();

document.getElementById("search").addEventListener("input",render);
document.getElementById("light").addEventListener("change",render);
document.getElementById("drought").addEventListener("change",render);

</script>

</body>
</html>
