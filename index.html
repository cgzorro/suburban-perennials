<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suburban Perennials</title>
  <style>
    :root {
      --bg: #071325;
      --bg-elev: #0d1d36;
      --bg-soft: #132746;
      --panel: #10233f;
      --text: #eef4ff;
      --text-muted: #b7c4da;
      --border: #29456f;
      --accent: #7bd05f;
      --accent-2: #88d87b;
      --chip-bg: #17325a;
      --chip-text: #eef4ff;
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.28);
      --input-bg: #132746;
      --card-bg: #0d1d36;
      --success: #67c35f;
    }

    html[data-theme="light"] {
      --bg: #eef4fb;
      --bg-elev: #ffffff;
      --bg-soft: #e7eef8;
      --panel: #dde7f5;
      --text: #182435;
      --text-muted: #526274;
      --border: #c5d3e8;
      --accent: #58b641;
      --accent-2: #65c24d;
      --chip-bg: #d8e5f7;
      --chip-text: #182435;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      --input-bg: #ffffff;
      --card-bg: #ffffff;
      --success: #53b44c;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(89, 156, 93, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(89, 156, 93, 0.08), transparent 24%),
        var(--bg);
    }

    .container {
      width: min(1480px, calc(100% - 28px));
      margin: 0 auto;
      padding: 20px 0 32px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 26px 28px;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.1rem, 3vw, 3rem);
      line-height: 1.02;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--text-muted);
      max-width: 980px;
      line-height: 1.3;
      font-size: 1rem;
    }

    .theme-toggle {
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
      height: fit-content;
    }

    .controls-wrap {
      background: linear-gradient(180deg, rgba(70, 102, 144, 0.42), rgba(35, 58, 95, 0.42));
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 16px;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: 2fr 1.1fr 1.2fr 1.1fr 1.1fr 0.9fr;
      gap: 12px;
      align-items: end;
    }

    .scan-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr;
      gap: 12px;
      align-items: end;
      margin-top: 14px;
    }

    .field label {
      display: block;
      font-size: .92rem;
      font-weight: 800;
      color: var(--text);
      margin: 0 0 8px;
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 1rem;
      outline: none;
    }

    .field input::placeholder {
      color: var(--text-muted);
      opacity: 0.92;
    }

    .button-col {
      display: flex;
      gap: 10px;
      align-items: end;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
      border-radius: 16px;
      padding: 13px 18px;
      cursor: pointer;
      font-weight: 800;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      transition: background .18s ease, border-color .18s ease, color .18s ease, opacity .18s ease;
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .btn.is-confirmed {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .btn.clear-active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .chip {
      border: 1px solid var(--border);
      background: var(--chip-bg);
      color: var(--chip-text);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: .95rem;
      cursor: pointer;
      user-select: none;
      font-weight: 700;
    }

    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .summary-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      background: linear-gradient(180deg, rgba(50, 84, 126, 0.55), rgba(24, 44, 76, 0.55));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 14px 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .pill {
      border: 1px solid var(--border);
      background: var(--bg-soft);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    .card {
      background: linear-gradient(180deg, #13294c, #0d1d36);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    html[data-theme="light"] .card {
      background: linear-gradient(180deg, #f7fbff, #edf4fb);
    }

    .card-image {
      aspect-ratio: 16 / 10;
      background: var(--bg-soft);
      overflow: hidden;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .no-image {
      width: 100%;
      height: 100%;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      background: var(--bg-soft);
      font-size: 1rem;
      text-align: center;
      padding: 16px;
    }

    .card-body {
      padding: 18px 18px 20px;
    }

    .card-title {
      margin: 0 0 10px;
      font-size: 1.15rem;
      line-height: 1.15;
      font-weight: 800;
    }

    .subline {
      color: var(--text-muted);
      font-size: .98rem;
      line-height: 1.35;
      margin-bottom: 12px;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .tag {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(98, 126, 176, 0.24);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: .92rem;
      font-weight: 800;
    }

    .tag.green {
      background: rgba(113, 193, 96, 0.18);
      color: #d9ffd0;
    }

    html[data-theme="light"] .tag.green {
      color: #245d1a;
    }

    .details {
      color: var(--text-muted);
      font-size: .98rem;
      line-height: 1.4;
      margin-bottom: 14px;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin-bottom: 14px;
    }

    .price {
      font-size: 1.1rem;
      font-weight: 900;
      color: #ffffff;
    }

    html[data-theme="light"] .price {
      color: #182435;
    }

    .sku {
      font-size: .95rem;
      color: var(--text-muted);
    }

    .product-btn {
      width: 100%;
      justify-content: center;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      border-color: var(--accent);
      color: white;
      font-size: 1rem;
      padding: 15px 18px;
      border-radius: 20px;
    }

    .empty {
      padding: 34px;
      text-align: center;
      color: var(--text-muted);
      border: 1px dashed var(--border);
      border-radius: 22px;
      background: var(--bg-elev);
    }

    @media (max-width: 1200px) {
      .controls-grid,
      .scan-grid {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }

    @media (max-width: 900px) {
      .container {
        width: min(100%, calc(100% - 14px));
        padding: 12px 0 18px;
      }

      .hero {
        padding: 18px 16px;
        border-radius: 20px;
      }

      .hero h1 {
        font-size: 1.8rem;
      }

      .hero p {
        font-size: .9rem;
        line-height: 1.22;
        margin-top: 6px;
      }

      .controls-wrap {
        padding: 14px;
        border-radius: 20px;
      }

      .controls-grid,
      .scan-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .field input,
      .field select {
        border-radius: 14px;
        padding: 12px 14px;
      }

      .chips {
        gap: 8px;
      }

      .chip {
        padding: 8px 11px;
        font-size: .84rem;
      }

      .results-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .card {
        border-radius: 18px;
      }

      .card-body {
        padding: 14px;
      }

      .card-title {
        font-size: 1.02rem;
      }

      .subline,
      .details,
      .sku {
        font-size: .9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div>
        <h1>Suburban Perennials</h1>
        <p>Search by name, SKU, exposure, or group. Cards show size and mature height × width for quick lookup.</p>
      </div>
      <button id="themeToggle" class="theme-toggle" type="button">Theme: Dark</button>
    </section>

    <section class="controls-wrap">
      <div class="controls-grid">
        <div class="field">
          <label for="searchInput">Search catalog</label>
          <input id="searchInput" type="text" placeholder="Name, common name, genus, SKU" />
        </div>

        <div class="field">
          <label for="exposureFilter">Exposure</label>
          <select id="exposureFilter">
            <option value="">All exposures</option>
          </select>
        </div>

        <div class="field">
          <label for="groupFilter">Plant group</label>
          <select id="groupFilter">
            <option value="">All groups</option>
          </select>
        </div>

        <div class="field">
          <label for="colorFilter">Color</label>
          <select id="colorFilter">
            <option value="">All colors</option>
          </select>
        </div>

        <div class="field">
          <label for="heightFilter">Height</label>
          <select id="heightFilter">
            <option value="">All heights</option>
            <option value="under12">Under 12"</option>
            <option value="12to24">12–24"</option>
            <option value="24to36">24–36"</option>
            <option value="36plus">36"+</option>
          </select>
        </div>

        <div class="field">
          <label for="showCount">Show</label>
          <select id="showCount">
            <option value="24">24 cards</option>
            <option value="48" selected>48 cards</option>
            <option value="96">96 cards</option>
            <option value="9999">All cards</option>
          </select>
        </div>
      </div>

      <div class="chips" id="traitChips"></div>

      <div class="button-col">
        <button id="clearFilters" class="btn" type="button">Clear filters</button>
      </div>

      <div class="scan-grid">
        <div class="field">
          <label for="scanSkuInput">Scan SKU / exact product ID</label>
          <input
            id="scanSkuInput"
            type="text"
            inputmode="text"
            enterkeyhint="search"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
            placeholder="Enter or scan SKU"
          />
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="scanSkuBtn" class="btn primary" type="button" style="width:100%;">Scan SKU</button>
        </div>

        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>
    </section>

    <section class="summary-bar" id="summaryBar"></section>

    <section id="results" class="results-grid"></section>
  </div>

  <script>
    const state = {
      plants: [],
      filtered: [],
      activeTraits: new Set(),
      visibleCount: 48,
      theme: localStorage.getItem("suburban-theme") || "dark",
      clearFlashTimer: null,
      scanFlashTimer: null
    };

    const TRAITS = [
      "sun",
      "shade",
      "pollinator",
      "drought",
      "deer resistant"
    ];

    const els = {
      html: document.documentElement,
      themeToggle: document.getElementById("themeToggle"),
      searchInput: document.getElementById("searchInput"),
      exposureFilter: document.getElementById("exposureFilter"),
      groupFilter: document.getElementById("groupFilter"),
      colorFilter: document.getElementById("colorFilter"),
      heightFilter: document.getElementById("heightFilter"),
      showCount: document.getElementById("showCount"),
      scanSkuInput: document.getElementById("scanSkuInput"),
      scanSkuBtn: document.getElementById("scanSkuBtn"),
      clearFilters: document.getElementById("clearFilters"),
      traitChips: document.getElementById("traitChips"),
      summaryBar: document.getElementById("summaryBar"),
      results: document.getElementById("results")
    };

    function setTheme(theme) {
      state.theme = theme;
      els.html.setAttribute("data-theme", theme);
      localStorage.setItem("suburban-theme", theme);
      els.themeToggle.textContent = theme === "dark" ? "Theme: Dark" : "Theme: Light";
    }

    function normalizeText(v) {
      return (v || "").toString().trim().toLowerCase();
    }

    function normalizeSku(v) {
      return (v || "").toString().replace(/\s+/g, "").trim().toLowerCase();
    }

    function isTruthy(value) {
      if (value === true) return true;
      if (value === false || value == null) return false;
      const t = String(value).trim().toLowerCase();
      return ["true", "yes", "y", "1", "x"].includes(t);
    }

    function getPlantGroup(plant) {
      const sources = [
        plant.plant_group,
        plant.category,
        plant.section,
        plant.name,
        plant.common,
        plant.genus
      ]
        .filter(Boolean)
        .map(v => String(v).toLowerCase());

      const haystack = sources.join(" | ");

      if (haystack.includes("rose") || haystack.includes("roses")) return "Roses";
      if (haystack.includes("clematis")) return "Clematis";
      if (haystack.includes("grapes") || haystack.includes("berries")) return "Grapes & Berries";
      if (haystack.includes("ground cover")) return "Ground Covers";
      if (haystack.includes("hardy vining")) return "Hardy Vining Plants";
      if (haystack.includes("native perennial")) return "Native Perennials";
      if (haystack.includes("peonies") || haystack.includes("peony")) return "Peonies";
      if (haystack.includes("perennials - shade")) return "Perennials - Shade";
      if (haystack.includes("perennials - sun")) return "Perennials - Sun";

      return plant.plant_group || plant.category || plant.section || "Perennials";
    }

    function getExposure(plant) {
      const light = String(plant.light || "").toLowerCase();
      const group = String(getPlantGroup(plant)).toLowerCase();

      if (group.includes("perennials - sun")) return "Sun";
      if (group.includes("perennials - shade")) return "Shade";

      const hasSun = light.includes("sun");
      const hasShade = light.includes("shade");

      if ((hasSun && hasShade) || light.includes("part sun") || light.includes("part shade") || light.includes("full-part")) {
        return "Mixed";
      }
      if (hasSun) return "Sun";
      if (hasShade) return "Shade";
      return "Unknown";
    }

    function inferTraits(plant) {
      const exposure = getExposure(plant);
      const haystack = [
        plant.name,
        plant.common,
        plant.genus,
        plant.category,
        plant.plant_group,
        plant.section,
        plant.light,
        plant.description,
        plant.notes
      ].join(" ").toLowerCase();

      return {
        sun: exposure === "Sun",
        shade: exposure === "Shade",
        pollinator:
          isTruthy(plant.pollinator) ||
          haystack.includes("pollinator") ||
          haystack.includes("butterfly") ||
          haystack.includes("bee"),
        drought:
          isTruthy(plant.drought) ||
          haystack.includes("drought"),
        "deer resistant":
          isTruthy(plant.deer) ||
          isTruthy(plant.deer_resistant) ||
          isTruthy(plant.deerResistant) ||
          haystack.includes("deer")
      };
    }

    function inferColor(plant) {
      return plant.color || "";
    }

    function parseHeightToInches(heightText) {
      if (!heightText) return null;
      const t = String(heightText).toLowerCase();

      let m = t.match(/(\d+)\s*-\s*(\d+)\s*(?:in|")/);
      if (m) return (Number(m[1]) + Number(m[2])) / 2;

      m = t.match(/(\d+)\s*(?:in|")/);
      if (m) return Number(m[1]);

      m = t.match(/(\d+)\s*-\s*(\d+)\s*ft/);
      if (m) return ((Number(m[1]) + Number(m[2])) / 2) * 12;

      m = t.match(/(\d+)\s*ft/);
      if (m) return Number(m[1]) * 12;

      return null;
    }

    function heightBucket(heightText) {
      const inches = parseHeightToInches(heightText);
      if (inches == null) return "";
      if (inches < 12) return "under12";
      if (inches < 24) return "12to24";
      if (inches < 36) return "24to36";
      return "36plus";
    }

    function imageFor(plant) {
      return plant.image || "";
    }

    function updateActionButtons() {
      const hasAnythingToClear =
        !!normalizeText(els.searchInput.value) ||
        !!normalizeText(els.scanSkuInput.value) ||
        !!els.exposureFilter.value ||
        !!els.groupFilter.value ||
        !!els.colorFilter.value ||
        !!els.heightFilter.value ||
        state.activeTraits.size > 0;

      els.clearFilters.classList.toggle("clear-active", hasAnythingToClear);
    }

    function populateFilters(plants) {
      const groups = [...new Set(plants.map(getPlantGroup).filter(Boolean))].sort();
      const colors = [...new Set(plants.map(inferColor).filter(Boolean))].sort();

      const exposures = [...new Set(plants.map(getExposure))]
        .filter(Boolean)
        .sort((a, b) => {
          const order = ["Sun", "Shade", "Mixed", "Unknown"];
          return order.indexOf(a) - order.indexOf(b);
        });

      els.groupFilter.innerHTML = `<option value="">All groups</option>`;
      els.colorFilter.innerHTML = `<option value="">All colors</option>`;
      els.exposureFilter.innerHTML = `<option value="">All exposures</option>`;

      groups.forEach(group => {
        const opt = document.createElement("option");
        opt.value = group;
        opt.textContent = group;
        els.groupFilter.appendChild(opt);
      });

      colors.forEach(color => {
        const opt = document.createElement("option");
        opt.value = color;
        opt.textContent = color;
        els.colorFilter.appendChild(opt);
      });

      exposures.forEach(exposure => {
        const opt = document.createElement("option");
        opt.value = exposure;
        opt.textContent = exposure;
        els.exposureFilter.appendChild(opt);
      });
    }

    function renderTraitChips() {
      els.traitChips.innerHTML = "";

      TRAITS.forEach(trait => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip" + (state.activeTraits.has(trait) ? " active" : "");
        btn.textContent = trait.replace(/\b\w/g, m => m.toUpperCase());

        btn.addEventListener("click", () => {
          if (state.activeTraits.has(trait)) state.activeTraits.delete(trait);
          else state.activeTraits.add(trait);

          renderTraitChips();
          applyFilters();
        });

        els.traitChips.appendChild(btn);
      });

      updateActionButtons();
    }

    function matchesSearch(plant, q) {
      if (!q) return true;

      const haystack = [
        plant.name,
        plant.sku,
        plant.common,
        plant.genus,
        plant.species,
        plant.series,
        plant.category,
        plant.plant_group,
        plant.section,
        plant.light,
        plant.height,
        plant.width,
        plant.color
      ].join(" ").toLowerCase();

      return haystack.includes(q);
    }

    function flashButton(btn, text, resetText, timerKey) {
      btn.classList.add("is-confirmed");
      btn.textContent = text;
      window.clearTimeout(state[timerKey]);
      state[timerKey] = window.setTimeout(() => {
        btn.classList.remove("is-confirmed");
        btn.textContent = resetText;
        updateActionButtons();
      }, 1400);
    }

    function clearFilters() {
      els.searchInput.value = "";
      els.exposureFilter.value = "";
      els.groupFilter.value = "";
      els.colorFilter.value = "";
      els.heightFilter.value = "";
      els.scanSkuInput.value = "";
      state.activeTraits.clear();
      renderTraitChips();
      applyFilters();
      flashButton(els.clearFilters, "Filters Cleared", "Clear filters", "clearFlashTimer");
    }

    function scanSku() {
      const sku = normalizeSku(els.scanSkuInput.value);

      if (!sku) {
        flashButton(els.scanSkuBtn, "No Match", "Scan SKU", "scanFlashTimer");
        return;
      }

      els.searchInput.value = "";
      els.exposureFilter.value = "";
      els.groupFilter.value = "";
      els.colorFilter.value = "";
      els.heightFilter.value = "";
      state.activeTraits.clear();
      renderTraitChips();

      state.filtered = state.plants.filter(plant => normalizeSku(plant.sku) === sku);

      if (!state.filtered.length) {
        state.filtered = state.plants.filter(plant => normalizeSku(plant.sku).includes(sku));
      }

      renderSummary();
      renderResults();
      updateActionButtons();

      flashButton(
        els.scanSkuBtn,
        state.filtered.length ? `Found ${state.filtered.length}` : "No Match",
        "Scan SKU",
        "scanFlashTimer"
      );
    }

    function applyFilters() {
      const q = normalizeText(els.searchInput.value);
      const exposure = els.exposureFilter.value;
      const group = els.groupFilter.value;
      const color = els.colorFilter.value;
      const height = els.heightFilter.value;
      state.visibleCount = Number(els.showCount.value || 48);

      state.filtered = state.plants.filter(plant => {
        if (!matchesSearch(plant, q)) return false;
        if (exposure && getExposure(plant) !== exposure) return false;
        if (group && getPlantGroup(plant) !== group) return false;
        if (color && inferColor(plant) !== color) return false;
        if (height && heightBucket(plant.height) !== height) return false;

        const traits = inferTraits(plant);
        for (const trait of state.activeTraits) {
          if (!traits[trait]) return false;
        }

        return true;
      });

      renderSummary();
      renderResults();
      updateActionButtons();
    }

    function renderSummary() {
      const total = state.plants.length;
      const showing = state.filtered.length;
      const sun = state.filtered.filter(p => getExposure(p) === "Sun").length;
      const shade = state.filtered.filter(p => getExposure(p) === "Shade").length;
      const activeTraits = state.activeTraits.size;

      els.summaryBar.innerHTML = `
        <span class="pill">${total} loaded</span>
        <span class="pill">${showing} showing</span>
        <span class="pill">${sun} sun</span>
        <span class="pill">${shade} shade</span>
        <span class="pill">${activeTraits} active traits</span>
      `;
    }

    function renderResults() {
      els.results.innerHTML = "";

      if (!state.filtered.length) {
        els.results.innerHTML = `<div class="empty">No plants match the current filters.</div>`;
        return;
      }

      const visiblePlants = state.filtered.slice(0, state.visibleCount);

      visiblePlants.forEach(plant => {
        const traits = inferTraits(plant);
        const exposure = getExposure(plant);
        const img = imageFor(plant);

        const extraTags = [];
        if (traits.pollinator) extraTags.push("Pollinator");
        if (traits.drought) extraTags.push("Drought");
        if (traits["deer resistant"]) extraTags.push("Deer Resistant");

        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="card-image">
            ${img
              ? `<img src="${img}" alt="${plant.name || "Plant"}" loading="lazy" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=&quot;no-image&quot;>Image unavailable</div>';">`
              : `<div class="no-image">No image available</div>`
            }
          </div>
          <div class="card-body">
            <h3 class="card-title">${plant.name || "Unnamed Plant"}</h3>
            <div class="subline">
              ${(plant.common || "")}${plant.common && plant.genus ? " • " : ""}${plant.genus || ""}
            </div>

            <div class="tag-row">
              <span class="tag green">${exposure}</span>
              <span class="tag">${getPlantGroup(plant)}</span>
              ${plant.size ? `<span class="tag">${plant.size}</span>` : ""}
            </div>

            <div class="details">
              ${plant.size ? `Size: ${plant.size}<br>` : ""}
              ${(plant.height || plant.width) ? `Mature size: ${plant.height || "—"} × ${plant.width || "—"}` : ""}
            </div>

            ${extraTags.length ? `
              <div class="tag-row">
                ${extraTags.map(t => `<span class="tag">${t}</span>`).join("")}
              </div>
            ` : ""}

            <div class="price-row">
              <div class="price">${plant.price || ""}</div>
              <div class="sku">SKU: ${plant.sku || "—"}</div>
            </div>

            ${plant.link ? `<a class="btn product-btn" href="${plant.link}" target="_blank" rel="noopener noreferrer">View Product</a>` : ""}
          </div>
        `;
        els.results.appendChild(card);
      });
    }

    async function loadPlants() {
      try {
        const res = await fetch("./plants.json", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        state.plants = Array.isArray(data) ? data : [];
        populateFilters(state.plants);
        renderTraitChips();
        applyFilters();
      } catch (err) {
        els.summaryBar.innerHTML = `<span class="pill">Failed to load plants</span>`;
        els.results.innerHTML = `<div class="empty">Could not load <code>plants.json</code>. ${err.message}</div>`;
      }
    }

    function wireEvents() {
      els.themeToggle.addEventListener("click", () => {
        setTheme(state.theme === "dark" ? "light" : "dark");
      });

      els.searchInput.addEventListener("input", applyFilters);
      els.exposureFilter.addEventListener("change", applyFilters);
      els.groupFilter.addEventListener("change", applyFilters);
      els.colorFilter.addEventListener("change", applyFilters);
      els.heightFilter.addEventListener("change", applyFilters);
      els.showCount.addEventListener("change", applyFilters);
      els.clearFilters.addEventListener("click", clearFilters);
      els.scanSkuBtn.addEventListener("click", scanSku);

      els.scanSkuInput.addEventListener("input", updateActionButtons);
      els.scanSkuInput.addEventListener("focus", updateActionButtons);

      els.scanSkuInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          scanSku();
        }
      });
    }

    setTheme(state.theme);
    wireEvents();
    loadPlants();
  </script>
</body>
</html>
