<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suburban Perennials Finder</title>
  <style>
    :root {
      --bg: #f6f6f4;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --green: #2f4f2f;
      --green-2: #5d7a5d;
      --chip: #eef4ee;
      --chip-active: #2f4f2f;
      --chip-active-text: #ffffff;
      --shadow: 0 2px 10px rgba(0,0,0,.08);
    }

    body.dark {
      --bg: #111827;
      --card: #1f2937;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --border: #374151;
      --green: #7fb07f;
      --green-2: #99c299;
      --chip: #243224;
      --chip-active: #7fb07f;
      --chip-active-text: #111827;
      --shadow: 0 2px 12px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, Arial, sans-serif;
      transition: background .2s ease, color .2s ease;
    }

    .container {
      max-width: 1150px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.05;
    }

    .theme-toggle {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    .panel,
    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }

    .search-box {
      width: 100%;
      padding: 14px 16px;
      font-size: 17px;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      background: var(--card);
      color: var(--text);
    }

    .chip-row,
    .tag-row,
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .chip-btn,
    .action-btn {
      border: 1px solid var(--border);
      background: var(--chip);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
    }

    .chip-btn.active {
      background: var(--chip-active);
      color: var(--chip-active-text);
      border-color: var(--chip-active);
    }

    .filters-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    select {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      color: var(--text);
    }

    .status {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.4;
    }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .card {
      padding: 0;
      overflow: hidden;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      background: #dfe7df;
    }

    body.dark .thumb {
      background: #273244;
    }

    .card-body {
      padding: 14px 16px 16px;
    }

    .card-title {
      font-size: 1.12rem;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .meta {
      color: var(--muted);
      line-height: 1.45;
      margin-bottom: 4px;
      font-size: 0.96rem;
    }

    .tag {
      display: inline-block;
      background: var(--chip);
      color: var(--green);
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
    }

    .link-btn {
      display: inline-block;
      margin-top: 12px;
      text-decoration: none;
      background: var(--green);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
    }

    body.dark .link-btn {
      color: #111827;
    }

    .subtle {
      font-size: .9rem;
      color: var(--muted);
      margin-top: 6px;
    }

    @media (min-width: 760px) {
      .filters-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .results-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1100px) {
      .results-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>Suburban Perennials Finder</h1>
      <button id="themeToggle" class="theme-toggle" type="button">🌙 Dark Mode</button>
    </div>

    <div class="panel">
      <input
        id="search"
        class="search-box"
        type="text"
        placeholder="Search plant, SKU, common name, genus, category..."
      />

      <div class="chip-row">
        <button type="button" class="chip-btn" id="chipSun">Sun</button>
        <button type="button" class="chip-btn" id="chipShade">Shade</button>
        <button type="button" class="chip-btn" id="chipRoses">Roses</button>
        <button type="button" class="chip-btn" id="chipDrought">Drought</button>
        <button type="button" class="chip-btn" id="chipPollinator">Pollinator</button>
        <button type="button" class="chip-btn" id="chipDeer">Deer Resistant</button>
        <button type="button" class="chip-btn" id="chipNative">Native</button>
      </div>

      <div class="filters-grid">
        <select id="section">
          <option value="">All Sections</option>
          <option value="Perennials">Perennials</option>
          <option value="Roses">Roses</option>
        </select>

        <select id="category">
          <option value="">All Categories</option>
        </select>

        <select id="color">
          <option value="">All Colors</option>
        </select>

        <select id="sort">
          <option value="name">Sort: Name</option>
          <option value="sku">Sort: SKU</option>
          <option value="category">Sort: Category</option>
          <option value="price">Sort: Price</option>
        </select>
      </div>

      <div class="button-row" style="margin-top:12px;">
        <button type="button" class="action-btn" id="clearFilters">Clear Filters</button>
      </div>

      <div class="subtle">
        Tip: search by SKU like <strong>26170</strong>, common name like <strong>hosta</strong>, or category like <strong>yarrow</strong>.
      </div>
    </div>

    <div id="status" class="panel status">Loading plants…</div>
    <div id="results" class="results-grid"></div>
  </div>

  <script>
    let plants = [];

    const els = {
      search: document.getElementById("search"),
      section: document.getElementById("section"),
      category: document.getElementById("category"),
      color: document.getElementById("color"),
      sort: document.getElementById("sort"),
      status: document.getElementById("status"),
      results: document.getElementById("results"),
      clear: document.getElementById("clearFilters"),
      chipSun: document.getElementById("chipSun"),
      chipShade: document.getElementById("chipShade"),
      chipRoses: document.getElementById("chipRoses"),
      chipDrought: document.getElementById("chipDrought"),
      chipPollinator: document.getElementById("chipPollinator"),
      chipDeer: document.getElementById("chipDeer"),
      chipNative: document.getElementById("chipNative"),
      themeToggle: document.getElementById("themeToggle")
    };

    const state = {
      light: "",
      sectionChip: "",
      drought: false,
      pollinator: false,
      deer: false,
      native: false
    };

    function txt(v) {
      return String(v ?? "").trim();
    }

    function bool(v) {
      return v === true;
    }

    function priceValue(v) {
      const m = txt(v).match(/\d+(?:\.\d{2})?/);
      return m ? Number(m[0]) : Number.POSITIVE_INFINITY;
    }

    function setChipActive(el, on) {
      el.classList.toggle("active", on);
    }

    function buildDropdowns() {
      const categories = [...new Set(plants.map(p => txt(p.category)).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
      const colors = [...new Set(plants.map(p => txt(p.color)).filter(Boolean))].sort((a,b)=>a.localeCompare(b));

      els.category.innerHTML = '<option value="">All Categories</option>';
      categories.forEach(v => {
        const o = document.createElement("option");
        o.value = v;
        o.textContent = v;
        els.category.appendChild(o);
      });

      els.color.innerHTML = '<option value="">All Colors</option>';
      colors.forEach(v => {
        const o = document.createElement("option");
        o.value = v;
        o.textContent = v;
        els.color.appendChild(o);
      });
    }

    function clearFilters() {
      els.search.value = "";
      els.section.value = "";
      els.category.value = "";
      els.color.value = "";
      els.sort.value = "name";

      state.light = "";
      state.sectionChip = "";
      state.drought = false;
      state.pollinator = false;
      state.deer = false;
      state.native = false;

      syncChips();
      render();
    }

    function syncChips() {
      setChipActive(els.chipSun, state.light === "Sun");
      setChipActive(els.chipShade, state.light === "Shade");
      setChipActive(els.chipRoses, state.sectionChip === "Roses");
      setChipActive(els.chipDrought, state.drought);
      setChipActive(els.chipPollinator, state.pollinator);
      setChipActive(els.chipDeer, state.deer);
      setChipActive(els.chipNative, state.native);
    }

    function applyTheme(theme) {
      document.body.classList.toggle("dark", theme === "dark");
      els.themeToggle.textContent = theme === "dark" ? "☀️ Light Mode" : "🌙 Dark Mode";
      localStorage.setItem("finderTheme", theme);
    }

    function toggleTheme() {
      const isDark = document.body.classList.contains("dark");
      applyTheme(isDark ? "light" : "dark");
    }

    function placeholderSvg(label) {
      const safe = encodeURIComponent(label || "Plant");
      const fill = document.body.classList.contains("dark") ? "273244" : "dfe7df";
      const textFill = document.body.classList.contains("dark") ? "e5e7eb" : "374151";
      return `data:image/svg+xml;utf8,
      <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 450'>
        <rect width='600' height='450' fill='%23${fill}'/>
        <text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle'
          font-family='Arial, sans-serif' font-size='28' fill='%23${textFill}'>${safe}</text>
      </svg>`;
    }

    function render() {
      const search = txt(els.search.value).toLowerCase();
      const sectionDropdown = txt(els.section.value);
      const category = txt(els.category.value);
      const color = txt(els.color.value);
      const sort = txt(els.sort.value);

      let filtered = plants.filter((p) => {
        const name = txt(p.name).toLowerCase();
        const sku = txt(p.sku).toLowerCase();
        const common = txt(p.common).toLowerCase();
        const genus = txt(p.genus).toLowerCase();
        const categoryText = txt(p.category).toLowerCase();
        const colorText = txt(p.color).toLowerCase();
        const light = txt(p.light);
        const section = txt(p.section);

        if (
          search &&
          !name.includes(search) &&
          !sku.includes(search) &&
          !common.includes(search) &&
          !genus.includes(search) &&
          !categoryText.includes(search) &&
          !colorText.includes(search)
        ) return false;

        if (sectionDropdown && section !== sectionDropdown) return false;
        if (state.sectionChip && section !== state.sectionChip) return false;
        if (state.light && light !== state.light) return false;
        if (category && txt(p.category) !== category) return false;
        if (color && txt(p.color) !== color) return false;

        if (state.drought && !bool(p.drought)) return false;
        if (state.pollinator && !bool(p.pollinator)) return false;
        if (state.deer && !bool(p.deer)) return false;
        if (state.native && !bool(p.native)) return false;

        return true;
      });

      filtered.sort((a, b) => {
        if (sort === "sku") return txt(a.sku).localeCompare(txt(b.sku), undefined, { numeric: true });
        if (sort === "category") return txt(a.category).localeCompare(txt(b.category));
        if (sort === "price") return priceValue(a.price) - priceValue(b.price);
        return txt(a.name).localeCompare(txt(b.name));
      });

      els.results.innerHTML = "";

      if (plants.length === 0) {
        els.status.textContent = "No plant data loaded.";
        return;
      }

      if (filtered.length === 0) {
        els.status.textContent = `No matching plants found. Loaded ${plants.length} plants.`;
        return;
      }

      els.status.textContent = `Showing ${filtered.length} of ${plants.length} plants`;

      filtered.forEach((p) => {
        const image = txt(p.image);
        const title = txt(p.name) || "Unnamed plant";
        const size = txt(p.size);
        const sku = txt(p.sku) || "N/A";
        const common = txt(p.common);
        const genus = txt(p.genus);
        const category = txt(p.category);
        const light = txt(p.light) || "Not set";
        const price = txt(p.price);
        const height = txt(p.height);
        const width = txt(p.width);
        const section = txt(p.section);
        const link = txt(p.link);

        const tags = [
          bool(p.drought) ? '<span class="tag">Drought</span>' : '',
          bool(p.pollinator) ? '<span class="tag">Pollinator</span>' : '',
          bool(p.deer) ? '<span class="tag">Deer Resistant</span>' : '',
          bool(p.native) ? '<span class="tag">Native</span>' : '',
          txt(p.color) ? `<span class="tag">${txt(p.color)}</span>` : '',
          section ? `<span class="tag">${section}</span>` : ''
        ].join("");

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <img
            class="thumb"
            src="${image || placeholderSvg(common || title)}"
            alt="${title}"
            onerror="this.src='${placeholderSvg(common || title)}'"
          />
          <div class="card-body">
            <div class="card-title">${title}${size ? " " + size : ""}</div>
            <div class="meta"><strong>SKU:</strong> ${sku}</div>
            ${common ? `<div class="meta"><strong>Common:</strong> ${common}</div>` : ""}
            ${genus ? `<div class="meta"><strong>Genus:</strong> ${genus}</div>` : ""}
            ${category ? `<div class="meta"><strong>Category:</strong> ${category}</div>` : ""}
            <div class="meta"><strong>Light:</strong> ${light}</div>
            ${height ? `<div class="meta"><strong>Height:</strong> ${height}</div>` : ""}
            ${width ? `<div class="meta"><strong>Width:</strong> ${width}</div>` : ""}
            ${price ? `<div class="meta"><strong>Price:</strong> ${price}</div>` : ""}
            ${tags ? `<div class="tag-row">${tags}</div>` : ""}
            ${link ? `<a class="link-btn" href="${link}" target="_blank" rel="noopener noreferrer">Open Product Page</a>` : ""}
          </div>
        `;
        els.results.appendChild(card);
      });
    }

    async function loadPlants() {
      try {
        els.status.textContent = "Loading plants…";
        const response = await fetch("./plants.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        if (!Array.isArray(data)) throw new Error("plants.json is not an array");
        plants = data;
        buildDropdowns();
        syncChips();
        render();
      } catch (err) {
        console.error(err);
        els.status.textContent = `Failed to load plants.json: ${err.message}`;
        els.results.innerHTML = "";
      }
    }

    els.search.addEventListener("input", render);
    els.section.addEventListener("change", render);
    els.category.addEventListener("change", render);
    els.color.addEventListener("change", render);
    els.sort.addEventListener("change", render);
    els.clear.addEventListener("click", clearFilters);
    els.themeToggle.addEventListener("click", toggleTheme);

    els.chipSun.addEventListener("click", () => {
      state.light = state.light === "Sun" ? "" : "Sun";
      syncChips();
      render();
    });

    els.chipShade.addEventListener("click", () => {
      state.light = state.light === "Shade" ? "" : "Shade";
      syncChips();
      render();
    });

    els.chipRoses.addEventListener("click", () => {
      state.sectionChip = state.sectionChip === "Roses" ? "" : "Roses";
      syncChips();
      render();
    });

    els.chipDrought.addEventListener("click", () => {
      state.drought = !state.drought;
      syncChips();
      render();
    });

    els.chipPollinator.addEventListener("click", () => {
      state.pollinator = !state.pollinator;
      syncChips();
      render();
    });

    els.chipDeer.addEventListener("click", () => {
      state.deer = !state.deer;
      syncChips();
      render();
    });

    els.chipNative.addEventListener("click", () => {
      state.native = !state.native;
      syncChips();
      render();
    });

    const savedTheme = localStorage.getItem("finderTheme") || "dark";
    applyTheme(savedTheme);
    loadPlants();
  </script>
</body>
</html>
