<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Suburban Perennials Finder</title>

<style>
body{
font-family:Arial;
margin:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

button{
padding:10px;
border-radius:6px;
border:none;
background:#333;
color:white;
margin-top:10px;
}

input,select{
padding:10px;
margin-bottom:10px;
width:100%;
}

.tag{
display:inline-block;
background:#e8f0e8;
padding:4px 8px;
border-radius:6px;
font-size:12px;
margin-right:6px;
margin-top:6px;
}
</style>
</head>

<body>

<h2>Suburban Perennials Finder</h2>

<input id="search" placeholder="Search plant, color, genus or SKU">

<select id="light">
<option value="All">All Light</option>
<option value="Sun">Sun</option>
<option value="Shade">Shade</option>
</select>

<select id="height">
<option value="All">Any Height</option>
<option value="Short">Short</option>
<option value="Medium">Medium</option>
<option value="Tall">Tall</option>
</select>

<select id="color">
<option value="All">Any Bloom Color</option>
<option value="Purple">Purple</option>
<option value="Pink">Pink</option>
<option value="White">White</option>
<option value="Yellow">Yellow</option>
<option value="Red">Red</option>
<option value="Orange">Orange</option>
</select>

<label>
<input type="checkbox" id="drought">
Drought tolerant only
</label>

<div id="plants"></div>

<script>

let plants = [];

async function loadPlants(){

let response = await fetch("plants.json");

plants = await response.json();

render();

}

function render(){

let search=document.getElementById("search").value.toLowerCase();
let light=document.getElementById("light").value;
let height=document.getElementById("height").value;
let color=document.getElementById("color").value;
let drought=document.getElementById("drought").checked;

let results=plants.filter(p=>{

if(search &&
!p.name.toLowerCase().includes(search) &&
!p.common.toLowerCase().includes(search) &&
!p.genus.toLowerCase().includes(search) &&
!p.sku.toLowerCase().includes(search) &&
!p.color.toLowerCase().includes(search)
)
return false;

if(light!=="All" && p.light!==light)
return false;

if(height!=="All" && p.height!==height)
return false;

if(color!=="All" && p.color!==color)
return false;

if(drought && !p.drought)
return false;

return true;

});

let html="";

results.forEach(p=>{

html+=`
<div class="card">

<b>${p.name} ${p.size}</b><br>

SKU: ${p.sku}<br>
Common: ${p.common}<br>
Genus: ${p.genus}<br>
Light: ${p.light}<br>
Height: ${p.height}<br>
Color: ${p.color}<br>
Price: ${p.price}<br>

${p.pollinator ? '<span class="tag">Pollinator</span>' : ''}
${p.deer ? '<span class="tag">Deer Resistant</span>' : ''}
${p.native ? '<span class="tag">Native</span>' : ''}
${p.drought ? '<span class="tag">Drought</span>' : ''}

<br>

<a href="${p.link}" target="_blank">
<button>Open product page</button>
</a>

</div>
`;

});

document.getElementById("plants").innerHTML=html;

}

loadPlants();

document.getElementById("search").addEventListener("input",render);
document.getElementById("light").addEventListener("change",render);
document.getElementById("height").addEventListener("change",render);
document.getElementById("color").addEventListener("change",render);
document.getElementById("drought").addEventListener("change",render);

</script>

</body>
</html>
