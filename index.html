<style>
body{
  font-family:Arial, sans-serif;
  margin:20px;
  background:#f5f5f5;
}

h2{
  margin-bottom:16px;
}

.controls{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-bottom:18px;
}

.card{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}

button{
  padding:10px 14px;
  border-radius:6px;
  border:none;
  background:#333;
  color:white;
  margin-top:10px;
  cursor:pointer;
}

input,select{
  padding:10px;
  width:100%;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:16px;
  box-sizing:border-box;
}

label{
  font-size:15px;
}

.meta{
  margin-top:8px;
  line-height:1.5;
}

.tag{
  display:inline-block;
  background:#e8f0e8;
  color:#234;
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
  margin:4px 6px 0 0;
}

.empty{
  background:white;
  padding:18px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

@media (min-width:700px){
  .controls{
    grid-template-columns:repeat(2, 1fr);
  }
}
</style>
</head>

function render(){
  let search = document.getElementById("search").value.toLowerCase();
  let light = document.getElementById("light").value;
  let height = document.getElementById("height").value;
  let color = document.getElementById("color").value;
  let drought = document.getElementById("drought").checked;

  let results = plants.filter(p => {
    if (
      search &&
      !p.name.toLowerCase().includes(search) &&
      !p.common.toLowerCase().includes(search) &&
      !p.genus.toLowerCase().includes(search) &&
      !p.sku.toLowerCase().includes(search) &&
      !p.color.toLowerCase().includes(search)
    ) return false;

    if (light !== "All" && p.light !== light) return false;
    if (height !== "All" && p.height !== height) return false;
    if (color !== "All" && p.color !== color) return false;
    if (drought && !p.drought) return false;

    return true;
  });

  let html = "";

  if(results.length === 0){
    html = `
      <div class="empty">
        <b>No plants found.</b><br><br>
        Try clearing one filter, or search by a broader term like:
        <br>• yarrow
        <br>• hosta
        <br>• purple
        <br>• PACHFD1
      </div>
    `;
  } else {
    results.forEach(p => {
      html += `
      <div class="card">
        <b>${p.name}</b>
        <div class="meta">
          SKU: ${p.sku}<br>
          Common: ${p.common}<br>
          Genus: ${p.genus}<br>
          Light: ${p.light}<br>
          Height: ${p.height}<br>
          Bloom Color: ${p.color}<br>
          Drought: ${p.drought ? "Yes" : "No"}<br>
          Price: ${p.price}
        </div>

        <div style="margin-top:8px;">
          ${p.pollinator ? '<span class="tag">Pollinator</span>' : ''}
          ${p.deer ? '<span class="tag">Deer resistant</span>' : ''}
          ${p.native ? '<span class="tag">Native</span>' : ''}
          ${p.drought ? '<span class="tag">Drought tolerant</span>' : ''}
        </div>

        <a href="${p.link}" target="_blank" rel="noopener noreferrer">
          <button>Open product page</button>
        </a>
      </div>
      `;
    });
  }

  document.getElementById("plants").innerHTML = html;
}

render();

document.getElementById("search").addEventListener("input", render);
document.getElementById("light").addEventListener("change", render);
document.getElementById("height").addEventListener("change", render);
document.getElementById("color").addEventListener("change", render);

</script>
