<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suburban Perennials Finder</title>
  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f6f6f6;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 16px;
    }

    .controls, .status, .plant {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 4px rgba(0,0,0,.08);
      margin-bottom: 14px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .plant-name {
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 4px;
    }

    .sku {
      color: #666;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .price {
      margin-top: 6px;
      font-weight: 600;
    }

    .muted {
      color: #666;
      font-size: 14px;
    }

    a.button {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #333;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Suburban Perennials Finder</h1>

    <div class="controls">
      <input id="search" placeholder="Search plant or SKU" />

      <select id="light">
        <option value="">All Light</option>
        <option value="Sun">Sun</option>
        <option value="Shade">Shade</option>
      </select>

      <label>
        <input type="checkbox" id="drought" />
        Drought tolerant only
      </label>
    </div>

    <div id="status" class="status">Loading plants…</div>
    <div id="results"></div>
  </div>

  <script>
    let plants = [];

    const searchEl = document.getElementById("search");
    const lightEl = document.getElementById("light");
    const droughtEl = document.getElementById("drought");
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");

    function safeText(value) {
      return String(value ?? "");
    }

    function render() {
      const search = safeText(searchEl.value).toLowerCase().trim();
      const light = safeText(lightEl.value);
      const droughtOnly = droughtEl.checked;

      const filtered = plants.filter((p) => {
        const name = safeText(p.name).toLowerCase();
        const sku = safeText(p.sku).toLowerCase();
        const itemLight = safeText(p.light);
        const drought = Boolean(p.drought);

        if (search && !name.includes(search) && !sku.includes(search)) {
          return false;
        }

        if (light && itemLight !== light) {
          return false;
        }

        if (droughtOnly && !drought) {
          return false;
        }

        return true;
      });

      resultsEl.innerHTML = "";

      if (filtered.length === 0) {
        statusEl.textContent = plants.length === 0
          ? "No plant data loaded."
          : "No matching plants found.";
        return;
      }

      statusEl.textContent = `Showing ${filtered.length} of ${plants.length} plants`;

      filtered.forEach((p) => {
        const card = document.createElement("div");
        card.className = "plant";

        const name = safeText(p.name) || "Unnamed plant";
        const sku = safeText(p.sku) || "N/A";
        const light = safeText(p.light) || "Unknown";
        const price = safeText(p.price);
        const link = safeText(p.link);

        card.innerHTML = `
          <div class="plant-name">${name}</div>
          <div class="sku">SKU: ${sku}</div>
          <div>Light: ${light}</div>
          ${price ? `<div class="price">${price}</div>` : `<div class="muted">No price listed</div>`}
          ${link ? `<a class="button" href="${link}" target="_blank" rel="noopener noreferrer">Open product page</a>` : `<div class="muted">No product link</div>`}
        `;

        resultsEl.appendChild(card);
      });
    }

    async function loadPlants() {
      try {
        const response = await fetch("plants.json", { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (!Array.isArray(data)) {
          throw new Error("plants.json is not an array");
        }

        plants = data;
        render();
      } catch (err) {
        statusEl.textContent = `Failed to load plants.json: ${err.message}`;
        resultsEl.innerHTML = "";
        console.error(err);
      }
    }

    searchEl.addEventListener("input", render);
    lightEl.addEventListener("change", render);
    droughtEl.addEventListener("change", render);

    loadPlants();
  </script>
</body>
</html>
